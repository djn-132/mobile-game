<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON-STREAK</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; touch-action: none; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #00d4ff; pointer-events: none; }
        #score { font-size: 50px; font-weight: bold; margin: 0; text-shadow: 0 0 10px #00d4ff; }
    </style>
</head>
<body>
    <div id="ui"><div id="score">0</div></div>
    <canvas id="g"></canvas>
<script>
    const canvas = document.getElementById('g'), ctx = canvas.getContext('2d');
    let w, h, score = 0, particles = [], trail = [], obstacles = [];
    let player = { x: 0, y: 0, targetX: 0, speed: 4 };

    function init() {
        w = window.innerWidth; h = window.innerHeight;
        canvas.width = w * devicePixelRatio; canvas.height = h * devicePixelRatio;
        ctx.scale(devicePixelRatio, devicePixelRatio);
        player.x = w / 2; player.targetX = w / 2;
        player.y = h * 0.8;
    }
    window.addEventListener('resize', init);
    init();

    function spawnObstacle() {
        if (Math.random() < 0.05) {
            obstacles.push({
                x: Math.random() * w,
                y: -50,
                size: 20 + Math.random() * 30,
                speed: 2 + Math.random() * 3,
                type: Math.random() > 0.8 ? 'point' : 'wall'
            });
        }
    }

    function update() {
        // Smooth Movement (Easing)
        // As score increases, the "weight" makes player.x lag further behind player.targetX
        let weight = Math.min(0.1, 0.2 - (score * 0.001)); 
        player.x += (player.targetX - player.x) * weight;

        // Update Trail
        trail.unshift({x: player.x, y: player.y});
        if (trail.length > 20 + (score * 2)) trail.pop();

        // Update Obstacles
        spawnObstacle();
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.y += o.speed;

            // Collision Detection
            let d = Math.hypot(player.x - o.x, player.y - o.y);
            if (d < o.size) {
                if (o.type === 'point') {
                    score += 5;
                    obstacles.splice(i, 1);
                } else {
                    // Game Over
                    score = 0;
                    obstacles = [];
                    trail = [];
                }
            }
            if (o.y > h + 50) obstacles.splice(i, 1);
        }
        document.getElementById('score').innerText = score;
    }

    function draw() {
        ctx.fillStyle = 'rgba(5, 5, 5, 0.3)'; // Motion blur effect
        ctx.fillRect(0, 0, w, h);

        // Draw Trail (Neon Streak)
        ctx.beginPath();
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00d4ff';
        ctx.strokeStyle = '#00d4ff';
        ctx.lineWidth = 4;
        trail.forEach((p, i) => {
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        });
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Draw Obstacles
        obstacles.forEach(o => {
            ctx.beginPath();
            if (o.type === 'point') {
                ctx.fillStyle = '#fff';
                ctx.arc(o.x, o.y, 8, 0, Math.PI * 2);
            } else {
                ctx.fillStyle = '#ff0055';
                ctx.fillRect(o.x - o.size/2, o.y - o.size/2, o.size, o.size);
            }
            ctx.fill();
        });

        update();
        requestAnimationFrame(draw);
    }

    // Controls
    const move = (e) => {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        player.targetX = clientX;
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); }, {passive:false});

    draw();
</script>
</body>
</html>
