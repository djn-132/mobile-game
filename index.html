<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FLICK-SWORD PRO</title>
    <style>
        body { margin: 0; background: #0d0d12; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #ui { position: absolute; top: 40px; width: 100%; text-align: center; color: #00ff88; pointer-events: none; z-index: 10; }
        #score { font-size: 80px; font-weight: 900; margin: 0; opacity: 0.8; }
        #msg { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">0</div>
        <div id="msg">FLICK TO START</div>
    </div>
    <canvas id="g"></canvas>
<script>
    const c = document.getElementById('g'), x = c.getContext('2d');
    let w, h, score = 0, targets = [], drag = false, start = {x:0,y:0}, cur = {x:0,y:0};
    
    // ADJUSTED PHYSICS FOR BETTER PLAYABILITY
    const GRAVITY = 0.22;       // Lower = floatier
    const LAUNCH_POWER = 0.18;  // Higher = faster launch
    const FRICTION = 0.99;      // Air resistance
    
    let p = { x: 0, y: 0, vx: 0, vy: 0, a: -Math.PI/2, s: 'STUCK' };

    function res() {
        const d = window.devicePixelRatio || 1;
        w = window.innerWidth; h = window.innerHeight;
        c.width = w * d; c.height = h * d;
        c.style.width = w + 'px'; c.style.height = h + 'px';
        x.scale(d, d);
        p.x = w/2; p.y = h-150;
    }
    window.addEventListener('resize', res); res();

    function loop() {
        x.fillStyle = '#0d0d12'; 
        x.fillRect(0, 0, w, h);

        if (p.s === 'FLYING') {
            p.vy += GRAVITY;
            p.vx *= FRICTION;
            p.x += p.vx;
            p.y += p.vy;
            p.a = Math.atan2(p.vy, p.vx);

            // Wall Stick Logic
            if (p.x < 15 || p.x > w - 15) {
                p.s = 'STUCK';
                p.vx = 0; p.vy = 0;
                p.x = p.x < 15 ? 15 : w - 15;
            }
        }

        // Spawn Targets (Slightly larger hitboxes)
        if (Math.random() < 0.015 && targets.length < 5) {
            targets.push({x: 50 + Math.random()*(w-100), y: -50, r: 28});
        }

        targets.forEach((t, i) => {
            t.y += 1.5 + (score * 0.05);
            x.beginPath(); 
            x.arc(t.x, t.y, t.r, 0, 7); 
            x.strokeStyle = '#ff0055'; 
            x.lineWidth = 3;
            x.stroke();

            // Collision Detection
            if (Math.hypot(p.x - t.x, p.y - t.y) < t.r + 20 && p.s === 'FLYING') {
                targets.splice(i, 1);
                score++;
                document.getElementById('score').innerText = score;
                document.getElementById('msg').innerText = "NICE!";
            }
        });

        // Fail Logic
        if (p.y > h + 100) {
            score = 0;
            document.getElementById('score').innerText = 0;
            document.getElementById('msg').innerText = "FALLEN! TRY AGAIN";
            p.y = h-150; p.x = w/2; p.s = 'STUCK'; targets = [];
        }

        // Draw Aim Line
        if (drag && p.s === 'STUCK') {
            x.beginPath();
            x.moveTo(p.x, p.y);
            x.lineTo(p.x + (start.x - cur.x)*0.5, p.y + (start.y - cur.y)*0.5);
            x.strokeStyle = '#00ff88';
            x.lineWidth = 2;
            x.setLineDash([5, 5]);
            x.stroke();
            x.setLineDash([]);
        }

        // Draw Player
        x.save();
        x.translate(p.x, p.y);
        x.rotate(p.a);
        x.shadowBlur = 15; x.shadowColor = '#00ff88';
        x.fillStyle = '#fff';
        x.beginPath();
        x.moveTo(25, 0); x.lineTo(-10, -12); x.lineTo(-10, 12);
        x.fill();
        x.restore();
        x.shadowBlur = 0;

        requestAnimationFrame(loop);
    }

    const inputS = (ex, ey) => { 
        if(p.s==='STUCK'){
            drag=true; 
            start={x:ex, y:ey}; 
            cur={x:ex, y:ey};
        }
    };
    const inputM = (ex, ey) => { if(drag) cur={x:ex, y:ey}; };
    const inputE = () => { 
        if(drag){
            let dx = start.x - cur.x;
            let dy = start.y - cur.y;
            if(Math.hypot(dx, dy) > 15) {
                p.vx = dx * LAUNCH_POWER;
                p.vy = dy * LAUNCH_POWER;
                p.s = 'FLYING';
                document.getElementById('msg').innerText = "";
            }
            drag = false;
        }
    };

    window.addEventListener('touchstart', e => { e.preventDefault(); inputS(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
    window.addEventListener('touchmove', e => { e.preventDefault(); inputM(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
    window.addEventListener('touchend', inputE);
    
    // Mouse support for testing
    window.addEventListener('mousedown', e => inputS(e.clientX, e.clientY));
    window.addEventListener('mousemove', e => inputM(e.clientX, e.clientY));
    window.addEventListener('mouseup', inputE);

    loop();
</script>
</body>
</html>
